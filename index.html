<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrantFinder — Encuentra tu subvención</title>
  <meta name="description" content="Encuentra subvenciones públicas en España adaptadas a tu perfil">
  <meta name="theme-color" content="#0D2B4E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0D2B4E 0%, #1A4A7A 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 1200px;
      width: 100%;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }

    .sidebar {
      background: rgba(26, 74, 122, 0.4);
      border-radius: 16px;
      padding: 40px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      height: fit-content;
    }

    .sidebar h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #b4976e;
    }

    .sidebar p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 24px;
    }

    .filter-group {
      margin-bottom: 24px;
    }

    .filter-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .filter-input,
    .filter-select {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .filter-input:focus,
    .filter-select:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      border-color: #b4976e;
      box-shadow: 0 0 0 2px rgba(180, 151, 110, 0.2);
    }

    .filter-select option {
      background: #0D2B4E;
      color: #ffffff;
    }

    .main-content {
      background: rgba(26, 74, 122, 0.3);
      border-radius: 16px;
      padding: 40px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header {
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header h1 .accent {
      color: #b4976e;
    }

    .header p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 40px;
    }

    @media (max-width: 768px) {
      .action-buttons {
        grid-template-columns: 1fr;
      }
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      font-family: inherit;
    }

    .btn-primary {
      background: #b4976e;
      color: #0D2B4E;
    }

    .btn-primary:hover {
      background: #d4b896;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(180, 151, 110, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .result-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: #b4976e;
      transform: translateX(4px);
    }

    .result-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #b4976e;
    }

    .result-desc {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .result-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255, 255, 255, 0.6);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #b4976e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.6);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar Filters -->
    <div class="sidebar">
      <h2>Filtros</h2>
      <p>Refina tu búsqueda de subvenciones</p>

      <div class="filter-group">
        <label class="filter-label">Tipo de solicitante</label>
        <select class="filter-select" id="filterType">
          <option value="">Todos</option>
          <option value="pyme">PYME</option>
          <option value="startup">Startup</option>
          <option value="autonomo">Autónomo</option>
          <option value="empresa">Empresa</option>
          <option value="ong">ONG</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Sector</label>
        <select class="filter-select" id="filterSector">
          <option value="">Todos</option>
          <option value="tecnologia">Tecnología</option>
          <option value="energia">Energía</option>
          <option value="agricultura">Agricultura</option>
          <option value="turismo">Turismo</option>
          <option value="cultura">Cultura</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Región</label>
        <select class="filter-select" id="filterRegion">
          <option value="">Todas</option>
          <option value="madrid">Madrid</option>
          <option value="barcelona">Barcelona</option>
          <option value="valencia">Valencia</option>
          <option value="bilbao">Bilbao</option>
          <option value="sevilla">Sevilla</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Importe mínimo (€)</label>
        <input type="number" class="filter-input" id="filterAmount" placeholder="Ej: 50000" min="0">
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="header">
        <h1>Grant<span class="accent">Finder</span></h1>
        <p>Subvenciones públicas · España</p>
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" id="searchBtn">🔍 Buscar subvenciones</button>
        <button class="btn btn-secondary" id="resetBtn">↻ Limpiar filtros</button>
      </div>

      <div class="results" id="results">
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <p>Usa los filtros y haz clic en "Buscar subvenciones" para empezar</p>
        </div>
      </div>

      <div class="footer">
        <p>Información actualizada según datos públicos de organismos de financiación</p>
      </div>
    </div>
  </div>

  <script>
    // Mock data de subvenciones
    const grants = [
      {
        id: 1,
        title: "Subvención para Transformación Digital de PYMES",
        description: "Financiación de hasta el 80% para proyectos de digitalización en pequeñas y medianas empresas.",
        type: "pyme",
        sector: "tecnologia",
        region: "madrid",
        amount: 150000,
        deadline: "2026-06-30"
      },
      {
        id: 2,
        title: "Fondo de Innovación Tecnológica para Startups",
        description: "Apoyo a startups innovadoras en sectores estratégicos con dotación de hasta €100.000.",
        type: "startup",
        sector: "tecnologia",
        region: "barcelona",
        amount: 100000,
        deadline: "2026-07-15"
      },
      {
        id: 3,
        title: "Programa de Energías Renovables",
        description: "Subvención para instalación de paneles solares y sistemas de energía renovable.",
        type: "empresa",
        sector: "energia",
        region: "valencia",
        amount: 200000,
        deadline: "2026-08-30"
      },
      {
        id: 4,
        title: "Línea de crédito para Autónomos",
        description: "Financiación blanda para autónomos que creen o desarrollen su negocio.",
        type: "autonomo",
        sector: "tecnologia",
        region: "bilbao",
        amount: 50000,
        deadline: "2026-09-15"
      },
      {
        id: 5,
        title: "Fondo de Cultura y Patrimonio",
        description: "Apoyo a proyectos culturales, artísticos y de conservación del patrimonio histórico.",
        type: "ong",
        sector: "cultura",
        region: "sevilla",
        amount: 75000,
        deadline: "2026-10-01"
      },
      {
        id: 6,
        title: "Subvención para Turismo Sostenible",
        description: "Financiación para proyectos de turismo responsable y sostenible.",
        type: "pyme",
        sector: "turismo",
        region: "madrid",
        amount: 120000,
        deadline: "2026-08-15"
      }
    ];

    const searchBtn = document.getElementById('searchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const filterType = document.getElementById('filterType');
    const filterSector = document.getElementById('filterSector');
    const filterRegion = document.getElementById('filterRegion');
    const filterAmount = document.getElementById('filterAmount');
    const resultsDiv = document.getElementById('results');

    function formatCurrency(amount) {
      return new Intl.NumberFormat('es-ES', {
        style: 'currency',
        currency: 'EUR',
        minimumFractionDigits: 0
      }).format(amount);
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('es-ES', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function renderResults(filteredGrants) {
      if (filteredGrants.length === 0) {
        resultsDiv.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <p>No se encontraron subvenciones con estos criterios. Intenta ajustar los filtros.</p>
          </div>
        `;
        return;
      }

      resultsDiv.innerHTML = `
        <div style="margin-bottom: 16px; font-size: 13px; color: rgba(255, 255, 255, 0.6);">
          Se encontraron <strong style="color: #b4976e;">${filteredGrants.length}</strong> subvención${filteredGrants.length !== 1 ? 'es' : ''}
        </div>
        ${filteredGrants.map(grant => `
          <div class="result-item">
            <div class="result-title">${grant.title}</div>
            <div class="result-desc">${grant.description}</div>
            <div class="result-meta">
              <span>💰 ${formatCurrency(grant.amount)}</span>
              <span>📅 Cierra: ${formatDate(grant.deadline)}</span>
            </div>
          </div>
        `).join('')}
      `;
    }

    function search() {
      const type = filterType.value;
      const sector = filterSector.value;
      const region = filterRegion.value;
      const amount = parseInt(filterAmount.value) || 0;

      resultsDiv.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Buscando subvenciones...</p>
        </div>
      `;

      // Simular búsqueda con pequeño delay
      setTimeout(() => {
        const filtered = grants.filter(grant => {
          return (
            (!type || grant.type === type) &&
            (!sector || grant.sector === sector) &&
            (!region || grant.region === region) &&
            grant.amount >= amount
          );
        });

        renderResults(filtered);
      }, 600);
    }

    function reset() {
      filterType.value = '';
      filterSector.value = '';
      filterRegion.value = '';
      filterAmount.value = '';
      resultsDiv.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <p>Usa los filtros y haz clic en "Buscar subvenciones" para empezar</p>
        </div>
      `;
    }

    searchBtn.addEventListener('click', search);
    resetBtn.addEventListener('click', reset);

    // Buscar al presionar Enter en los inputs
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
